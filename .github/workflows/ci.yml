name: Verify

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Quality and integration
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: tutorhub_test
          POSTGRES_USER: tutorhub
          POSTGRES_PASSWORD: tutorhub_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tutorhub -d tutorhub_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CI: true
      DATABASE_POOL_URL: postgresql://tutorhub:tutorhub_ci@localhost:5432/tutorhub_test?sslmode=disable
      DATABASE_MIGRATION_URL: postgresql://tutorhub:tutorhub_ci@localhost:5432/tutorhub_test?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24.15.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.5
          cache-dependency-path: services/core-api/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check workflow security policy
        run: pnpm security:actions

      - name: PostgreSQL integration tests
        run: pnpm test:integration

      - name: Verify repository
        run: pnpm verify

  local-environment-smoke:
    name: Local environment smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24.15.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.5
          cache-dependency-path: services/core-api/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start, migrate, and seed local services twice
        run: |
          pnpm local:setup
          pnpm local:setup

      - name: Verify deterministic fixtures
        run: |
          test "$(docker compose exec -T postgres psql -U tutorhub -d tutorhub -Atc "SELECT count(*) FROM tutorhub.tenants WHERE slug = 'tutorhub-demo';")" = "1"
          test "$(docker compose exec -T postgres psql -U tutorhub -d tutorhub -Atc "SELECT count(*) FROM tutorhub.users WHERE email LIKE '%@tutorhub.local';")" = "2"
          test "$(docker compose exec -T postgres psql -U tutorhub -d tutorhub -Atc "SELECT count(*) FROM tutorhub.classes WHERE code = 'DEMO-VI-01';")" = "1"
          test "$(docker compose exec -T redis redis-cli ping)" = "PONG"

      - name: Stop local services
        if: always()
        run: docker compose down --volumes --remove-orphans
