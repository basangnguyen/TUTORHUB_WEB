openapi: 3.1.0
info:
  title: TutorHub Core API
  version: 0.0.1
  description: |
    Contract for TutorHub V2. Authenticated business operations use the active
    workspace from the server-side session and the shared authorization policy.
    A 403 response means the actor is known but lacks permission. A 404 response
    also covers resources outside the active tenant or class scope so identifiers
    cannot be enumerated across security boundaries.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      operationId: getHealth
      summary: Return the Core API health status
      responses:
        "200":
          description: Core API is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /live:
    get:
      operationId: getLiveness
      summary: Return process liveness
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivenessResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /ready:
    get:
      operationId: getReadiness
      summary: Return service readiness
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: At least one required dependency is unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/status:
    get:
      operationId: getAPIStatus
      summary: Return versioned Core API status
      responses:
        "200":
          description: Core API is available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIStatusResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/auth/login:
    get:
      operationId: beginLogin
      summary: Start an OIDC Authorization Code and PKCE flow
      parameters:
        - name: return_to
          in: query
          required: false
          description: Internal application path used after successful sign-in
          schema:
            type: string
            example: /app/home
      responses:
        "303":
          description: Redirect to the configured identity provider
          headers:
            Location:
              required: true
              schema:
                type: string
                format: uri
            Set-Cookie:
              schema:
                type: string
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/auth/callback:
    get:
      operationId: completeLogin
      summary: Complete the OIDC callback and issue a TutorHub session
      parameters:
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
      responses:
        "303":
          description: Session created and browser redirected to TutorHub Web
          headers:
            Location:
              required: true
              schema:
                type: string
                format: uri
            Set-Cookie:
              schema:
                type: string
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/auth/csrf:
    get:
      operationId: rotateCSRFToken
      summary: Rotate and return the CSRF token bound to the current session
      security:
        - SessionCookie: []
      responses:
        "200":
          description: CSRF token rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CSRFResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: Revoke the current TutorHub session
      security:
        - SessionCookie: []
      parameters:
        - name: X-CSRF-Token
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Local session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/me:
    get:
      operationId: getCurrentUser
      summary: Return the authenticated user and tenant context
      security:
        - SessionCookie: []
      responses:
        "200":
          description: Current authenticated principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/me/profile:
    get:
      operationId: getProfile
      summary: Return the authenticated user's editable profile
      security:
        - SessionCookie: []
      responses:
        "200":
          description: Editable user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
    patch:
      operationId: updateProfile
      summary: Update editable fields on the authenticated user's profile
      security:
        - SessionCookie: []
      parameters:
        - name: X-CSRF-Token
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateRequest"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "400":
          $ref: "#/components/responses/ProblemResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/me/identities:
    get:
      operationId: listIdentities
      summary: List external identities linked to the authenticated user
      security:
        - SessionCookie: []
      responses:
        "200":
          description: Linked external identities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/me/identities/link:
    post:
      operationId: beginIdentityLink
      summary: Begin a recent-authenticated external identity linking flow
      security:
        - SessionCookie: []
      parameters:
        - name: X-CSRF-Token
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Provider authorization URL for the one-time linking flow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdentityLinkResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/me/identities/{identity_id}:
    delete:
      operationId: unlinkIdentity
      summary: Unlink an external identity while preserving at least one login method
      security:
        - SessionCookie: []
      parameters:
        - name: identity_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-CSRF-Token
          in: header
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Identity unlinked
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/tenants:
    get:
      operationId: listTenants
      summary: List workspaces available to the authenticated user
      security:
        - SessionCookie: []
      responses:
        "200":
          description: Membership-scoped workspace list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
    post:
      operationId: createTenant
      summary: Create and activate a TutorHub workspace for an eligible user
      security:
        - SessionCookie: []
      parameters:
        - name: X-CSRF-Token
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "201":
          description: Workspace created and activated for the current session
          headers:
            Location:
              required: true
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "400":
          $ref: "#/components/responses/ProblemResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/tenants/{tenant_id}:
    get:
      operationId: getTenant
      summary: Return one workspace from the authenticated active scope
      security:
        - SessionCookie: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Active-scope workspace detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/ProblemResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
    patch:
      operationId: updateTenant
      summary: Update mutable workspace metadata using optimistic concurrency
      security:
        - SessionCookie: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-CSRF-Token
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantRequest"
      responses:
        "200":
          description: Updated workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/ProblemResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/tenants/{tenant_id}/capabilities:
    get:
      operationId: getTenantCapabilities
      summary: Return server-evaluated feature, quota, and operation capabilities
      description: Any active member of the authenticated active tenant may read this same-tenant snapshot. The response contains effective controls for that tenant; operation availability reflects feature and quota controls only and must be combined with actor/resource permissions. An actor allowed to manage overrides also receives configured edit values, but never another tenant's configuration or deployment guardrail source/ceiling.
      security:
        - SessionCookie: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Effective capability snapshot for the authenticated active tenant
          headers:
            Cache-Control:
              schema:
                type: string
                const: no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantCapabilities"
        "400":
          $ref: "#/components/responses/ProblemResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "429":
          $ref: "#/components/responses/ProblemResponse"
        "503":
          $ref: "#/components/responses/ProblemResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/tenants/{tenant_id}/feature-controls:
    put:
      operationId: updateTenantFeatureControls
      summary: Replace tenant feature overrides and quota limits
      description: Only an active organization administrator in the authenticated active tenant may replace these controls. expected_version provides optimistic concurrency; the returned capability snapshot is re-evaluated for the caller.
      security:
        - SessionCookie: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-CSRF-Token
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantFeatureControlsRequest"
      responses:
        "200":
          description: Updated controls and re-evaluated capability snapshot
          headers:
            Cache-Control:
              schema:
                type: string
                const: no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantCapabilities"
        "400":
          $ref: "#/components/responses/ProblemResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        "429":
          $ref: "#/components/responses/ProblemResponse"
        "503":
          $ref: "#/components/responses/ProblemResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/tenants/{tenant_id}/archive:
    post:
      operationId: archiveTenant
      summary: Archive an active workspace and rotate the current session context
      security:
        - SessionCookie: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-CSRF-Token
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArchiveTenantRequest"
      responses:
        "200":
          description: Workspace archived and session credentials rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "400":
          $ref: "#/components/responses/ProblemResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/tenants/{tenant_id}/audit-events:
    get:
      operationId: listAuditEvents
      summary: List append-only security audit history for the active workspace
      description: Only an active organization administrator may query this tenant-scoped history. Results use descending keyset pagination and never include raw tokens, sessions, email addresses, request bodies, or unredacted outbox payloads.
      security:
        - SessionCookie: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: occurred_from
          in: query
          schema:
            type: string
            format: date-time
        - name: occurred_to
          in: query
          description: Exclusive upper timestamp bound.
          schema:
            type: string
            format: date-time
        - name: action
          in: query
          schema:
            $ref: "#/components/schemas/AuditAction"
        - name: resource_type
          in: query
          schema:
            type: string
            minLength: 1
            maxLength: 80
            pattern: "^[a-z][a-z0-9_]*(\\.[a-z][a-z0-9_]*)*$"
        - name: resource_id
          in: query
          description: Requires resource_type to be present.
          schema:
            type: string
            format: uuid
        - name: outcome
          in: query
          schema:
            $ref: "#/components/schemas/AuditOutcome"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: cursor
          in: query
          description: Opaque cursor bound to the active tenant and all filters.
          schema:
            type: string
            maxLength: 1024
      responses:
        "200":
          description: Tenant-scoped audit page ordered by occurred_at and id descending
          headers:
            Cache-Control:
              schema:
                type: string
                const: no-store
            Referrer-Policy:
              schema:
                type: string
                const: no-referrer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventPage"
        "400":
          $ref: "#/components/responses/ProblemResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/tenants/{tenant_id}/invitations:
    get:
      operationId: listMembershipInvitations
      summary: List membership invitations in the authenticated active workspace
      security:
        - SessionCookie: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Tenant-scoped membership invitation list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipInvitationListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
    post:
      operationId: createMembershipInvitation
      summary: Create a one-time membership invitation in the active workspace
      security:
        - SessionCookie: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-CSRF-Token
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMembershipInvitationRequest"
      responses:
        "201":
          description: Invitation created; the share URL is returned only in this response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMembershipInvitationResponse"
        "400":
          $ref: "#/components/responses/ProblemResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/tenants/{tenant_id}/invitations/{invitation_id}/revoke:
    post:
      operationId: revokeMembershipInvitation
      summary: Revoke a pending membership invitation
      security:
        - SessionCookie: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: invitation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-CSRF-Token
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invitation revoked, including an idempotent repeated revoke
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipInvitation"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/membership-invitations/preview:
    post:
      operationId: previewMembershipInvitation
      summary: Preview a pending one-time membership invitation
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MembershipInvitationTokenRequest"
      responses:
        "200":
          description: Minimal invitation details safe to show before authentication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipInvitationPreview"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "429":
          $ref: "#/components/responses/ProblemResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/membership-invitations/accept:
    post:
      operationId: acceptMembershipInvitation
      summary: Accept a membership invitation using a verified linked identity
      security:
        - SessionCookie: []
      parameters:
        - name: X-CSRF-Token
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MembershipInvitationTokenRequest"
      responses:
        "200":
          description: Invitation accepted without changing the active workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipInvitationAcceptResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        "429":
          $ref: "#/components/responses/ProblemResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/session/active-tenant:
    put:
      operationId: switchActiveTenant
      summary: Switch the current session to an active tenant membership
      security:
        - SessionCookie: []
      parameters:
        - name: X-CSRF-Token
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchActiveTenantRequest"
      responses:
        "200":
          description: Active workspace changed and session credentials rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "400":
          $ref: "#/components/responses/ProblemResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/classes:
    get:
      operationId: listClasses
      summary: List classes in the authenticated active workspace
      security:
        - SessionCookie: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ClassStatus"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 512
      responses:
        "200":
          description: Tenant-scoped class list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassListResponse"
        "400":
          $ref: "#/components/responses/ProblemResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
    post:
      operationId: createClass
      summary: Create a draft class in the authenticated active workspace
      security:
        - SessionCookie: []
      parameters:
        - name: X-CSRF-Token
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassRequest"
      responses:
        "201":
          description: Class created
          headers:
            Location:
              required: true
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"
        "400":
          $ref: "#/components/responses/ProblemResponse"
        "401":
