openapi: 3.1.0
info:
  title: TutorHub Core API
  version: 0.0.1
  description: Initial contract for the TutorHub V2 engineering foundation.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      operationId: getHealth
      summary: Return the Core API health status
      responses:
        "200":
          description: Core API is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /live:
    get:
      operationId: getLiveness
      summary: Return process liveness
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivenessResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /ready:
    get:
      operationId: getReadiness
      summary: Return service readiness
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: At least one required dependency is unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/status:
    get:
      operationId: getAPIStatus
      summary: Return versioned Core API status
      responses:
        "200":
          description: Core API is available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIStatusResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/auth/login:
    get:
      operationId: beginLogin
      summary: Start an OIDC Authorization Code and PKCE flow
      parameters:
        - name: return_to
          in: query
          required: false
          description: Internal application path used after successful sign-in
          schema:
            type: string
            example: /app/home
      responses:
        "303":
          description: Redirect to the configured identity provider
          headers:
            Location:
              required: true
              schema:
                type: string
                format: uri
            Set-Cookie:
              schema:
                type: string
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/auth/callback:
    get:
      operationId: completeLogin
      summary: Complete the OIDC callback and issue a TutorHub session
      parameters:
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
      responses:
        "303":
          description: Session created and browser redirected to TutorHub Web
          headers:
            Location:
              required: true
              schema:
                type: string
                format: uri
            Set-Cookie:
              schema:
                type: string
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/auth/csrf:
    get:
      operationId: rotateCSRFToken
      summary: Rotate and return the CSRF token bound to the current session
      security:
        - SessionCookie: []
      responses:
        "200":
          description: CSRF token rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CSRFResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: Revoke the current TutorHub session
      security:
        - SessionCookie: []
      parameters:
        - name: X-CSRF-Token
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Local session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/me:
    get:
      operationId: getCurrentUser
      summary: Return the authenticated user and tenant context
      security:
        - SessionCookie: []
      responses:
        "200":
          description: Current authenticated principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: tutorhub_session
      description: Opaque TutorHub BFF session cookie; secure deployments use the __Host- prefix.
  responses:
    ProblemResponse:
      description: Request failed with a structured problem response
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, service, environment, timestamp]
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
        environment:
          type: string
        timestamp:
          type: string
          format: date-time
    LivenessResponse:
      type: object
      additionalProperties: false
      required: [status, timestamp]
      properties:
        status:
          type: string
          const: live
        timestamp:
          type: string
          format: date-time
    ReadinessCheck:
      type: object
      additionalProperties: false
      required: [name, status]
      properties:
        name:
          type: string
        status:
          type: string
          enum: [ready, not_ready]
    ReadinessResponse:
      type: object
      additionalProperties: false
      required: [status, checks, timestamp]
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        checks:
          type: array
          items:
            $ref: "#/components/schemas/ReadinessCheck"
        timestamp:
          type: string
          format: date-time
    APIStatusResponse:
      type: object
      additionalProperties: false
      required: [status, service, version, environment, timestamp]
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
        version:
          type: string
        environment:
          type: string
        timestamp:
          type: string
          format: date-time
    CSRFResponse:
      type: object
      additionalProperties: false
      required: [csrf_token]
      properties:
        csrf_token:
          type: string
    LogoutResponse:
      type: object
      additionalProperties: false
      properties:
        logout_url:
          type: string
          format: uri
    User:
      type: object
      additionalProperties: false
      required: [id, email, display_name, locale, timezone]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        locale:
          type: string
        timezone:
          type: string
    TenantMembership:
      type: object
      additionalProperties: false
      required: [id, slug, name, role, is_active]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [org_admin, teacher, student, guest]
        is_active:
          type: boolean
    MeResponse:
      type: object
      additionalProperties: false
      required: [user, active_tenant, memberships, permissions]
      properties:
        user:
          $ref: "#/components/schemas/User"
        active_tenant:
          oneOf:
            - $ref: "#/components/schemas/TenantMembership"
            - type: "null"
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/TenantMembership"
        permissions:
          type: array
          items:
            type: string
    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
        instance:
          type: string
        request_id:
          type: string
