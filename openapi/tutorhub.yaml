openapi: 3.1.0
info:
  title: TutorHub Core API
  version: 0.0.1
  description: Initial contract for the TutorHub V2 engineering foundation.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      operationId: getHealth
      summary: Return the Core API health status
      responses:
        "200":
          description: Core API is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /live:
    get:
      operationId: getLiveness
      summary: Return process liveness
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivenessResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /ready:
    get:
      operationId: getReadiness
      summary: Return service readiness
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: At least one required dependency is unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/status:
    get:
      operationId: getAPIStatus
      summary: Return versioned Core API status
      responses:
        "200":
          description: Core API is available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIStatusResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
components:
  responses:
    ProblemResponse:
      description: Request failed with a structured problem response
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, service, environment, timestamp]
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
        environment:
          type: string
        timestamp:
          type: string
          format: date-time
    LivenessResponse:
      type: object
      additionalProperties: false
      required: [status, timestamp]
      properties:
        status:
          type: string
          const: live
        timestamp:
          type: string
          format: date-time
    ReadinessCheck:
      type: object
      additionalProperties: false
      required: [name, status]
      properties:
        name:
          type: string
        status:
          type: string
          enum: [ready, not_ready]
    ReadinessResponse:
      type: object
      additionalProperties: false
      required: [status, checks, timestamp]
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        checks:
          type: array
          items:
            $ref: "#/components/schemas/ReadinessCheck"
        timestamp:
          type: string
          format: date-time
    APIStatusResponse:
      type: object
      additionalProperties: false
      required: [status, service, version, environment, timestamp]
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
        version:
          type: string
        environment:
          type: string
        timestamp:
          type: string
          format: date-time
    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
        instance:
          type: string
        request_id:
          type: string
