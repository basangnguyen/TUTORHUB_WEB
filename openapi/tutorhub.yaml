          $ref: "#/components/responses/NotFoundResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/classes/{class_id}/media-events:
    post:
      operationId: recordClassMediaEvent
      summary: Record bounded join telemetry for an active class
      security:
        - SessionCookie: []
      parameters:
        - name: class_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-CSRF-Token
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaEventRequest"
      responses:
        "204":
          description: Telemetry accepted for an active class
        "400":
          $ref: "#/components/responses/ProblemResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "409":
          $ref: "#/components/responses/ConflictResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/webhooks/livekit:
    post:
      operationId: receiveLiveKitWebhook
      summary: Receive a signed LiveKit server webhook
      security: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/webhook+json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "204":
          description: Webhook verified and accepted or already processed
        default:
          $ref: "#/components/responses/ProblemResponse"
components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: tutorhub_session
      description: Opaque TutorHub BFF session cookie; secure deployments use the __Host- prefix.
  responses:
    ProblemResponse:
      description: Request failed with a structured problem response
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    UnauthorizedResponse:
      description: Authentication is missing, expired, or invalid
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    ForbiddenResponse:
      description: The authenticated actor lacks permission in the active workspace
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFoundResponse:
      description: The resource is absent or outside the active tenant/class scope
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    ConflictResponse:
      description: The request conflicts with the current resource state or version
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
  schemas:
    OrganizationRole:
      type: string
      enum: [org_admin, teacher, student, guest]
    ClassRole:
      type: string
      enum: [owner, co_teacher, teaching_assistant, student]
    ClassEnrollmentRole:
      type: string
      description: Persisted enrollment roles; class owner remains implicit in classes.owner_user_id.
      enum: [co_teacher, teaching_assistant, student]
    Permission:
      type: string
      enum:
        - tenant.view
        - tenant.manage
        - tenant.manage_members
        - tenant.manage_features
        - class.create
        - class.update
        - class.archive
        - class.transfer_ownership
        - class.view
        - enrollment.manage
        - enrollment.leave
        - session.schedule
        - session.start
        - session.end
        - session.join
        - participant.admit
        - participant.remove
        - media.publish
        - chat.send
        - audit.view
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, service, environment, timestamp]
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
        environment:
          type: string
        timestamp:
          type: string
          format: date-time
    LivenessResponse:
      type: object
      additionalProperties: false
